<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Radar Miniatura</title>
<style>
  body { background:#0a0a0a; color:#0f0; font-family:monospace; padding:20px; }
  .radar-box { width:100%; max-width:400px; height:200px; background:#000; border:1px solid #333; margin:10px 0; position:relative; }
  canvas { display:block; width:100%; height:100%; }
  table { width:100%; border-collapse:collapse; margin:10px 0; }
  th, td { border:1px solid #333; padding:4px; text-align:left; }
  .btn { background:#111; color:#0f0; border:1px solid #0f0; padding:5px 10px; cursor:pointer; margin-right:5px; }
  .row { display:flex; gap:12px; margin:6px 0; flex-wrap:wrap; }
</style>
</head>
<body>

<h2>Radar Miniatura</h2>
<div id="status">RADAR MINIATURA offline ⚙</div>
<div>server ngrok: <span id="ngrok"></span></div>

<div class="row">
  <button id="btnConnect" class="btn">connetti</button>
  <button id="btnClear" class="btn">✕ Svuota radar</button>
</div>

<div class="radar-box">
  <canvas id="c"></canvas>
</div>

<div class="row">
  <span id="m1">Ultimo Rilevamento Angolo — °</span>
  <span id="m2">Distanza — cm</span>
</div>
<div class="row">
  <span id="m3">Min — Max — 0 rilevamenti</span>
  <span id="m4">Ø — ⚠ 0</span>
</div>

<table>
  <thead><tr><th>Ora</th><th>Ang</th><th>Dist</th></tr></thead>
  <tbody id="tb">
    <tr><td>Nessun dato</td><td>Nessun dato</td><td>Nessun dato</td></tr>
  </tbody>
</table>

<div class="row">
  <button id="btnHistory" class="btn">↺ Storico</button>
  <button id="btnDelete" class="btn">✕ Cancella</button>
</div>

<script>
  // ─── CANVAS SETUP ─────────────────────────────────────
  const c = document.getElementById('c');
  const ctx = c.getContext('2d');
  function resize() { c.width = c.parentElement.clientWidth; c.height = c.parentElement.clientHeight; }
  resize(); window.onresize = resize;

  // ─── STATO RADAR ──────────────────────────────────────
  let ang = 0, dir = 1, lastT = 0;
  let stutterEnd = 0, edgePauseEnd = 0;
  let detections = [];
  const speed = 0.05; // gradi/ms (regola velocità scansione)

  // ─── LOOP ANIMAZIONE ──────────────────────────────────
  function loop(t) {
    if (!lastT) lastT = t;
    const dt = t - lastT; lastT = t;
    const now = Date.now();
    const w = c.width, h = c.height, cx = w / 2, cy = h, r = w / 2;

    // Sfondo
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);

    // Griglia semicerchi
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
    for (let i = 1; i <= 4; i++) {
      ctx.beginPath(); ctx.arc(cx, cy, r * i / 4, 0, Math.PI); ctx.stroke();
    }

    // Punti rilevati
    detections.forEach(d => {
      const rad = d.a * Math.PI / 180;
      const dist = Math.min(d.d, 200);
      const x = cx + Math.cos(rad) * (dist / 200) * r;
      const y = cy - Math.sin(rad) * (dist / 200) * r;
      ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
    });

    // Aggiorna angolo (solo se non in stutter o pausa bordo)
    if (now >= stutterEnd && now >= edgePauseEnd) {
      ang += dir * speed * dt;
      if (ang >= 180) { ang = 180; dir = -1; edgePauseEnd = now + 1000; } // ⏸️ 1s a 180°
      if (ang <= 0)   { ang = 0;   dir = 1;  edgePauseEnd = now + 1000; } // ⏸️ 1s a 0°
    }

    // Linea di scansione
    const rad = ang * Math.PI / 180;
    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(rad) * r, cy - Math.sin(rad) * r);
    ctx.stroke();

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ─── WEBSOCKET & UI ───────────────────────────────────
  let ws;
  document.getElementById('btnConnect').onclick = () => {
    if (ws) return;
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);
    
    ws.onopen = () => document.getElementById('status').textContent = 'RADAR MINIATURA online 🟢';
    ws.onclose = () => { ws = null; document.getElementById('status').textContent = 'RADAR MINIATURA offline ⚙'; };
    ws.onmessage = e => {
      try {
        const d = JSON.parse(e.data);
        if (d.angolo !== undefined && d.distanza !== undefined) {
          // Aggiungi punto
          detections.unshift({ a: d.angolo, d: d.distanza });
          if (detections.length > 100) detections.pop();
          
          // ⚡ Stutter su ogni rilevamento
          stutterEnd = Date.now() + 150;

          // Aggiorna metriche
          document.getElementById('m1').textContent = `Ultimo Rilevamento Angolo ${d.angolo}°`;
          document.getElementById('m2').textContent = `Distanza ${d.distanza} cm`;
          
          // Aggiorna tabella
          const tb = document.getElementById('tb');
          const time = new Date().toLocaleTimeString('it-IT');
          tb.innerHTML = `<tr><td>${time}</td><td>${d.angolo}</td><td>${d.distanza}</td></tr>` + tb.innerHTML;
          if (tb.rows.length > 10) tb.deleteRow(tb.rows.length - 1);
          if (tb.rows[0] && tb.rows[0].cells[0].textContent.includes('Nessun')) tb.deleteRow(0);
        }
      } catch (err) {}
    };
  };

  document.getElementById('btnClear').onclick = () => {
    detections = [];
    document.getElementById('tb').innerHTML = '<tr><td>Nessun dato</td><td>Nessun dato</td><td>Nessun dato</td></tr>';
  };

  document.getElementById('btnHistory').onclick = () => {
    fetch('/api/storico?limit=50').then(r => r.json()).then(console.log);
  };

  document.getElementById('btnDelete').onclick = () => {
    if (confirm('Cancellare storico?')) fetch('/api/storico', { method: 'DELETE' }).then(r => r.json()).then(res => alert(`Eliminati: ${res.eliminati}`));
  };
</script>
</body>
</html>
