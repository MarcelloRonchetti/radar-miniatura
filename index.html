<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar Militare</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#000;
    color:#00ff41;
    font-family:'Courier New', monospace;
    min-height:100vh;
  }

  header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 24px;
    border-bottom:1px solid #003300;
  }
  .title { font-size:1.1rem; letter-spacing:0.3em; font-weight:bold; }
  .status { font-size:0.75rem; letter-spacing:0.1em; display:flex; align-items:center; gap:8px; }
  .dot { width:8px;height:8px;border-radius:50%;background:#ff0000;animation:blink 1s infinite;flex-shrink:0; }
  .dot.online { background:#00ff41;animation:none; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

  /* config banner (mostrato solo se non configurato) */
  #configBanner {
    background:#110000;
    border:1px solid #330000;
    color:#ff6666;
    padding:12px 24px;
    font-size:0.8rem;
    display:none;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }
  #configBanner input {
    background:#000;
    border:1px solid #330000;
    color:#ff6666;
    padding:6px 10px;
    font-family:'Courier New',monospace;
    font-size:0.8rem;
    width:320px;
  }
  #configBanner button {
    background:none;
    border:1px solid #ff3333;
    color:#ff3333;
    padding:6px 14px;
    font-family:'Courier New',monospace;
    cursor:pointer;
  }

  .main {
    display:flex;
    gap:24px;
    padding:24px;
    flex-wrap:wrap;
    justify-content:center;
  }

  /* radar */
  #radarCanvas { display:block; border:1px solid #003300; }

  /* pannello */
  .panel {
    flex:1;
    min-width:280px;
    max-width:400px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .box { border:1px solid #003300; padding:16px; background:#000; }
  .box-title {
    font-size:0.7rem;
    letter-spacing:0.2em;
    color:#005500;
    margin-bottom:12px;
    border-bottom:1px solid #003300;
    padding-bottom:6px;
  }
  .last-data { font-size:1.4rem; letter-spacing:0.1em; }
  .last-data span { color:#00ff41; }
  .last-label { font-size:0.7rem; color:#005500; margin-top:2px; }

  .storico-wrap { max-height:260px; overflow-y:auto; }
  .storico-wrap::-webkit-scrollbar { width:4px; }
  .storico-wrap::-webkit-scrollbar-thumb { background:#003300; }
  table { width:100%; border-collapse:collapse; font-size:0.8rem; }
  th { color:#005500; font-size:0.65rem; letter-spacing:0.15em; padding:4px 8px; border-bottom:1px solid #003300; text-align:left; }
  td { padding:5px 8px; border-bottom:1px solid #001100; }
  tr:hover td { background:#001100; }

  .btn { padding:8px 16px; background:none; border:1px solid #003300; color:#00ff41; font-family:'Courier New',monospace; font-size:0.75rem; letter-spacing:0.1em; cursor:pointer; }
  .btn:hover { background:#001100; }
  .btn-danger { border-color:#330000; color:#ff3333; }
  .btn-danger:hover { background:#110000; }

  .counter { font-size:0.75rem; color:#005500; margin-top:8px; }
</style>
</head>
<body>

<header>
  <div class="title">⬡ SISTEMA RADAR MINIATURA</div>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">OFFLINE</span>
  </div>
</header>

<!-- Banner configurazione (visibile se manca il server URL) -->
<div id="configBanner">
  ⚠ Inserisci l'URL del tuo server ngrok:
  <input type="text" id="serverInput" placeholder="https://il-tuo-dominio.ngrok-free.app">
  <button onclick="salvaServer()">CONNETTI</button>
</div>

<div class="main">

  <canvas id="radarCanvas" width="480" height="480"></canvas>

  <div class="panel">

    <div class="box">
      <div class="box-title">ULTIMO RILEVAMENTO</div>
      <div class="last-data">ANG: <span id="lastAng">---</span>°</div>
      <div class="last-label">angolazione</div>
      <div class="last-data" style="margin-top:8px">DST: <span id="lastDist">---</span> cm</div>
      <div class="last-label">distanza</div>
      <div style="margin-top:10px;font-size:0.7rem;color:#005500" id="lastTime">--:--:--</div>
    </div>

    <div class="box" style="flex:1">
      <div class="box-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>STORICO RILEVAMENTI</span>
        <button class="btn btn-danger" onclick="cancellaStorico()">CANCELLA</button>
      </div>
      <div class="storico-wrap">
        <table>
          <thead><tr><th>ORA</th><th>ANG</th><th>DIST</th></tr></thead>
          <tbody id="storicoBody"></tbody>
        </table>
      </div>
      <div class="counter" id="counter">0 rilevamenti</div>
    </div>

    <button class="btn" onclick="caricaStorico()">↺ RICARICA STORICO</button>

  </div>
</div>

<script>
// ─── CONFIGURAZIONE SERVER ────────────────────
// Legge l'URL ngrok dal localStorage (salvato dall'utente)
// oppure da un parametro ?server=https://... nell'URL
function getServerUrl() {
  const params = new URLSearchParams(location.search);
  if (params.get('server')) {
    localStorage.setItem('radarServer', params.get('server'));
  }
  return localStorage.getItem('radarServer');
}

function salvaServer() {
  const val = document.getElementById('serverInput').value.trim().replace(/\/$/, '');
  if (!val) return;
  localStorage.setItem('radarServer', val);
  document.getElementById('configBanner').style.display = 'none';
  init();
}

// ─── RADAR CANVAS ─────────────────────────────
const canvas = document.getElementById('radarCanvas');
const ctx    = canvas.getContext('2d');
const CX     = canvas.width / 2;
const CY     = canvas.height;
const R      = canvas.height - 20;
const punti  = [];
let   sweepAngle = 0;

function gradToRad(deg) {
  return Math.PI - (deg * Math.PI / 180);
}

function drawRadar() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Cerchi
  ctx.lineWidth = 0.5;
  [0.25, 0.5, 0.75, 1.0].forEach(f => {
    ctx.strokeStyle = '#003300';
    ctx.beginPath();
    ctx.arc(CX, CY, R * f, Math.PI, 2 * Math.PI);
    ctx.stroke();
    ctx.fillStyle = '#005500';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(`${Math.round(f * 100)}cm`, CX + R * f + 3, CY - 3);
  });

  // Linee angolari
  for (let a = 0; a <= 180; a += 30) {
    const rad = gradToRad(a);
    ctx.strokeStyle = '#002200';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.lineTo(CX + R * Math.cos(rad), CY + R * Math.sin(rad));
    ctx.stroke();
    ctx.fillStyle = '#005500';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    const lx = CX + (R + 14) * Math.cos(rad);
    const ly = CY + (R + 14) * Math.sin(rad);
    ctx.fillText(`${a}°`, lx, ly);
  }

  // Punti rilevati con fade
  punti.forEach(p => {
    const rad  = gradToRad(p.angolo);
    const pr   = (Math.min(p.distanza, 100) / 100) * R;
    const px   = CX + pr * Math.cos(rad);
    const py   = CY + pr * Math.sin(rad);
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, 2 * Math.PI);
    ctx.fillStyle = `rgba(0,255,65,${p.alpha})`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px, py, 9, 0, 2 * Math.PI);
    ctx.strokeStyle = `rgba(0,255,65,${p.alpha * 0.25})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    p.alpha -= 0.002;
  });
  for (let i = punti.length - 1; i >= 0; i--) {
    if (punti[i].alpha <= 0) punti.splice(i, 1);
  }

  // Linea sweep
  const swRad = gradToRad(sweepAngle);
  const g = ctx.createLinearGradient(CX, CY,
    CX + R * Math.cos(swRad), CY + R * Math.sin(swRad));
  g.addColorStop(0, 'rgba(0,255,65,0)');
  g.addColorStop(1, 'rgba(0,255,65,0.9)');
  ctx.beginPath();
  ctx.moveTo(CX, CY);
  ctx.lineTo(CX + R * Math.cos(swRad), CY + R * Math.sin(swRad));
  ctx.strokeStyle = g;
  ctx.lineWidth = 2;
  ctx.stroke();

  sweepAngle = (sweepAngle + 0.3) % 180;
  requestAnimationFrame(drawRadar);
}
drawRadar();

function addPoint(angolo, distanza) {
  sweepAngle = angolo;
  punti.push({ angolo, distanza, alpha: 1.0 });
}

// ─── WEBSOCKET ────────────────────────────────
let ws;
let totalCount = 0;

function connectWS(serverUrl) {
  const wsUrl = serverUrl.replace(/^http/, 'ws');
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    document.getElementById('statusDot').className  = 'dot online';
    document.getElementById('statusText').textContent = 'ONLINE — ' + serverUrl.replace('https://', '');
  };

  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    addPoint(d.angolo, d.distanza);
    aggiornaUltimo(d);
    aggiungiRiga(d, true);
    totalCount++;
    document.getElementById('counter').textContent = totalCount + ' rilevamenti';
  };

  ws.onclose = () => {
    document.getElementById('statusDot').className  = 'dot';
    document.getElementById('statusText').textContent = 'OFFLINE — riconnessione...';
    setTimeout(() => connectWS(serverUrl), 4000);
  };

  ws.onerror = () => ws.close();
}

// ─── API STORICO ──────────────────────────────
async function caricaStorico() {
  const url = getServerUrl();
  if (!url) return;
  try {
    const res  = await fetch(`${url}/api/storico?limit=100`);
    const dati = await res.json();
    document.getElementById('storicoBody').innerHTML = '';
    dati.forEach(d => aggiungiRiga(d, false));
    dati.slice(0, 40).forEach(d => addPoint(d.angolo, d.distanza));
    totalCount = dati.length;
    document.getElementById('counter').textContent = totalCount + ' rilevamenti';
  } catch(e) {
    console.error('Errore caricamento storico:', e);
  }
}

async function cancellaStorico() {
  const url = getServerUrl();
  if (!url || !confirm('Cancellare tutto lo storico?')) return;
  await fetch(`${url}/api/storico`, { method:'DELETE' });
  document.getElementById('storicoBody').innerHTML = '';
  totalCount = 0;
  document.getElementById('counter').textContent = '0 rilevamenti';
}

// ─── TABELLA ──────────────────────────────────
function aggiornaUltimo(d) {
  document.getElementById('lastAng').textContent  = parseFloat(d.angolo).toFixed(1);
  document.getElementById('lastDist').textContent = d.distanza;
  document.getElementById('lastTime').textContent =
    new Date(d.timestamp).toLocaleTimeString('it-IT');
}

function aggiungiRiga(d, prepend) {
  const tbody = document.getElementById('storicoBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${new Date(d.timestamp).toLocaleTimeString('it-IT')}</td>
    <td>${parseFloat(d.angolo).toFixed(1)}°</td>
    <td>${d.distanza} cm</td>`;
  if (prepend) tbody.insertBefore(tr, tbody.firstChild);
  else         tbody.appendChild(tr);
}

// ─── INIT ─────────────────────────────────────
function init() {
  const url = getServerUrl();
  if (!url) {
    document.getElementById('configBanner').style.display = 'flex';
    return;
  }
  connectWS(url);
  caricaStorico();
}

init();
</script>
</body>
</html>
