<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar Miniatura</title>
  <style>
    :root {
      --bg: #0a0f14; --panel: #111820; --border: #1f2937;
      --primary: #00ff88; --accent: #00ccff; --danger: #ff4444;
      --text: #e2e8f0; --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 20px; min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; color: var(--primary); margin-bottom: 15px; font-size: 1.8rem; }
    
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--panel); padding: 10px 15px; border-radius: 8px;
      border: 1px solid var(--border); margin-bottom: 15px; font-size: 0.9rem;
    }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
    .dot-red { background: var(--danger); } .dot-green { background: var(--primary); box-shadow: 0 0 5px var(--primary); }
    
    .stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px; margin-bottom: 15px;
    }
    .stat-box {
      background: var(--panel); padding: 12px; text-align: center;
      border: 1px solid var(--border); border-radius: 8px;
    }
    .stat-box span { display: block; font-size: 1.3rem; color: var(--accent); font-weight: bold; }
    .stat-box small { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; }
    
    .canvas-wrap { text-align: center; margin-bottom: 15px; }
    canvas {
      background: radial-gradient(circle, #0d1a24 0%, #05080a 100%);
      border: 2px solid var(--primary); border-radius: 50%;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.15);
      max-width: 100%; height: auto;
    }
    
    .controls {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px;
    }
    button {
      background: #1e293b; color: var(--text); border: 1px solid var(--border);
      padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.9rem;
      transition: all 0.2s;
    }
    button:hover { background: #2a3a4d; border-color: var(--accent); }
    button.primary { background: #064e3b; border-color: var(--primary); color: var(--primary); }
    button.danger { border-color: var(--danger); color: var(--danger); background: #3b0a0a; }
    button.active { background: #064e3b; color: var(--primary); border-color: var(--primary); box-shadow: 0 0 8px rgba(0,255,136,0.3); }
    
    table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 8px; overflow: hidden; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: #151c25; color: var(--accent); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    .empty { text-align: center; color: var(--muted); padding: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 RADAR MINIATURA</h1>
    
    <div class="status-bar">
      <span id="connStatus"><span class="status-dot dot-red"></span>Disconnesso</span>
      <span id="simStatus">🤖 Sim: OFF</span>
      <span id="ngrokStatus">🌐 ngrok: Inattivo</span>
    </div>

    <div class="stats">
      <div class="stat-box"><small>Angolo</small><span id="lastAngle">— °</span></div>
      <div class="stat-box"><small>Distanza</small><span id="lastDist">— cm</span></div>
      <div class="stat-box"><small>Min</small><span id="minDist">— cm</span></div>
      <div class="stat-box"><small>Max</small><span id="maxDist">— cm</span></div>
      <div class="stat-box"><small>Rilevamenti</small><span id="count">0</span></div>
    </div>

    <div class="canvas-wrap">
      <canvas id="radarCanvas" width="400" height="400"></canvas>
    </div>

    <div class="controls">
      <button id="btnConnect" class="primary">🔌 Connetti</button>
      <button id="btnSim">🤖 Modalità Sim</button>
      <button id="btnHistory">↺ Carica Storico</button>
      <button id="btnClear">🗑️ Cancella Radar</button>
      <button id="btnClearDB" class="danger">🗑️ Svuota DB</button>
    </div>

    <table>
      <thead><tr><th>Ora</th><th>Angolo</th><th>Distanza</th></tr></thead>
      <tbody id="dataTable"><tr class="empty"><td colspan="3">Nessun dato disponibile</td></tr></tbody>
    </table>
  </div>

  <script>
    // ─── CONFIGURAZIONE ─────────────────────────────
    const MAX_DIST = 200;
    let detections = [];
    let minD = Infinity, maxD = -Infinity, count = 0;
    let ws = null;
    let simInterval = null;
    let sweepAngle = 0;

    // ─── CANVAS & ANIMAZIONE ────────────────────────
    const canvas = document.getElementById('radarCanvas');
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2, cy = canvas.height / 2, maxR = (canvas.width / 2) - 15;

    function drawRadar() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Cerchi concentrici
      ctx.strokeStyle = '#1f2937';
      ctx.lineWidth = 1;
      for(let i = 1; i <= 4; i++) {
        ctx.beginPath(); ctx.arc(cx, cy, maxR * (i/4), 0, Math.PI*2); ctx.stroke();
      }
      // Linee angolari
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + maxR, cy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - maxR); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx - maxR*0.707, cy - maxR*0.707); ctx.stroke();

      // Sweep radar
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(sweepAngle);
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.arc(0, 0, maxR, -0.3, 0);
      ctx.fillStyle = 'rgba(0, 255, 136, 0.15)';
      ctx.fill();
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(maxR, 0);
      ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 2; ctx.stroke();
      ctx.restore();

      // Punti rilevati
      detections.forEach(d => {
        if(d.dist > MAX_DIST) return;
        const r = (d.dist / MAX_DIST) * maxR;
        const rad = d.angle * Math.PI / 180;
        const px = cx + r * Math.cos(rad);
        const py = cy - r * Math.sin(rad);
        ctx.fillStyle = d.dist < 50 ? '#ff4444' : '#00ff88';
        ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI*2); ctx.fill();
      });

      sweepAngle += 0.02;
      if(sweepAngle > Math.PI*2) sweepAngle = 0;
      requestAnimationFrame(drawRadar);
    }
    drawRadar();

    // ─── WEBSOCKET ──────────────────────────────────
    function connectWS() {
      const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = `${proto}//${window.location.host}`;
      ws = new WebSocket(url);

      ws.onopen = () => {
        document.getElementById('connStatus').innerHTML = '<span class="status-dot dot-green"></span>Connesso';
        document.getElementById('btnConnect').disabled = true;
      };
      ws.onclose = () => {
        document.getElementById('connStatus').innerHTML = '<span class="status-dot dot-red"></span>Disconnesso';
        document.getElementById('btnConnect').disabled = false;
        setTimeout(connectWS, 3000);
      };
      ws.onmessage = (e) => {
        try {
          const { angolo, distanza, timestamp } = JSON.parse(e.data);
          if(angolo == null || distanza == null) return;
          updateData(angolo, distanza, new Date(timestamp));
        } catch(err) { console.warn('Parse WS:', err); }
      };
    }

    document.getElementById('btnConnect').onclick = connectWS;

    // ─── GESTIONE DATI ──────────────────────────────
    function updateData(angle, dist, ts) {
      detections.push({ angle, dist, ts });
      if(detections.length > 500) detections.shift();
      minD = Math.min(minD, dist);
      maxD = Math.max(maxD, dist);
      count++;

      document.getElementById('lastAngle').textContent = `${angle}°`;
      document.getElementById('lastDist').textContent = `${dist} cm`;
      document.getElementById('minDist').textContent = `${minD === Infinity ? '—' : minD} cm`;
      document.getElementById('maxDist').textContent = `${maxD === -Infinity ? '—' : maxD} cm`;
      document.getElementById('count').textContent = count;
      updateTable();
    }

    function updateTable() {
      const tbody = document.getElementById('dataTable');
      if(detections.length === 0) {
        tbody.innerHTML = '<tr class="empty"><td colspan="3">Nessun dato disponibile</td></tr>';
        return;
      }
      tbody.innerHTML = detections.slice(-10).reverse().map(d => 
        `<tr><td>${d.ts.toLocaleTimeString()}</td><td>${d.angle}°</td><td>${d.dist} cm</td></tr>`
      ).join('');
    }

    // ─── CONTROLLI UI ───────────────────────────────
    document.getElementById('btnClear').onclick = () => {
      detections = []; minD = Infinity; maxD = -Infinity; count = 0;
      document.getElementById('lastAngle').textContent = '— °';
      document.getElementById('lastDist').textContent = '— cm';
      document.getElementById('minDist').textContent = '— cm';
      document.getElementById('maxDist').textContent = '— cm';
      document.getElementById('count').textContent = '0';
      updateTable();
    };

    document.getElementById('btnClearDB').onclick = async () => {
      if(!confirm('⚠️ Cancellare TUTTI i dati dal database?')) return;
      try {
        const res = await fetch('/api/storico', { method: 'DELETE' });
        const data = await res.json();
        alert(`✅ Eliminati ${data.eliminati || 0} record`);
        document.getElementById('btnClear').click();
      } catch(err) { alert('❌ Errore cancellazione DB'); console.error(err); }
    };

    document.getElementById('btnHistory').onclick = async () => {
      try {
        const res = await fetch('/api/storico?limit=100');
        const data = await res.json();
        detections = data.map(d => ({ angle: d.angolo, dist: d.distanza, ts: new Date(d.timestamp) }));
        count = detections.length;
        if(count > 0) {
          const dists = detections.map(d => d.dist);
          minD = Math.min(...dists); maxD = Math.max(...dists);
        } else { minD = Infinity; maxD = -Infinity; }
        document.getElementById('count').textContent = count;
        document.getElementById('minDist').textContent = minD === Infinity ? '—' : `${minD} cm`;
        document.getElementById('maxDist').textContent = maxD === -Infinity ? '—' : `${maxD} cm`;
        updateTable();
      } catch(err) { alert('❌ Errore caricamento storico'); }
    };

    // ─── SIMULAZIONE ────────────────────────────────
    document.getElementById('btnSim').onclick = () => {
      const btn = document.getElementById('btnSim');
      if(simInterval) {
        clearInterval(simInterval); simInterval = null;
        btn.classList.remove('active');
        document.getElementById('simStatus').textContent = '🤖 Sim: OFF';
        return;
      }
      btn.classList.add('active');
      document.getElementById('simStatus').textContent = '🤖 Sim: ON';
      simInterval = setInterval(() => {
        const angle = Math.floor(Math.random() * 180);
        const dist = Math.floor(Math.random() * 180) + 10;
        updateData(angle, dist, new Date());
      }, 200);
    };

    // ─── AVVIO ──────────────────────────────────────
    window.addEventListener('load', () => {
      // Tenta connessione automatica
      connectWS();
      // Verifica ngrok (se attivo, la pagina sarà servita da https)
      if(window.location.hostname.includes('ngrok')) {
        document.getElementById('ngrokStatus').textContent = '🌐 ngrok: Attivo';
      }
    });
  </script>
</body>
</html>
