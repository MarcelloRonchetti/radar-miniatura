<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar Miniatura</title>
  <link href="https://cdn.jsdelivr.net/npm/fontsource-jetbrains-mono@5.1.0/400.css" rel="stylesheet">
  <style>
    :root {
      --bg: #161b22;
      --surface: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --accent: #58a6c8;
      --accent-soft: rgba(88, 166, 200, 0.15);
      --danger: #f85149;
      --success: #3fb950;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 500; }
    #serverBanner {
      background: #9a6b00;
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #serverBanner input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 4px;
      width: 280px;
      font-family: inherit;
    }
    #serverBanner button {
      background: var(--accent);
      border: none;
      color: #000;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
      padding: 20px;
      gap: 20px;
    }
    .radar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }
    #radar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: block;
      max-width: 100%;
      height: auto;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--border); }
    .btn.danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .btn.danger:hover { filter: brightness(1.1); }
    .storico-wrap {
      width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      min-height: 0;
    }
    .storico-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .storico-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-size: 0.85rem;
    }
    .storico-item {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .storico-item:last-child { border-bottom: none; }
    .storico-item .ang { color: var(--accent); }
    .storico-item .dist { color: var(--success); }
    .storico-item .time { color: var(--text-dim); font-size: 0.75rem; }
    #status {
      padding: 6px 16px;
      font-size: 0.8rem;
      color: var(--text-dim);
      text-align: center;
      flex-shrink: 0;
    }
    #status.connected { color: var(--success); }
    #status.error { color: var(--danger); }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Radar Miniatura</h1>
    <div id="serverBanner">
      <span>Server URL:</span>
      <input type="text" id="serverUrl" placeholder="https://xxxx.ngrok-free.dev">
      <button id="connectBtn">CONECTTI</button>
    </div>
  </header>

  <div class="main">
    <div class="radar-wrap">
      <canvas id="radar" width="900" height="500"></canvas>
      <div class="controls">
        <button class="btn" id="refreshBtn">🔄 Aggiorna storico</button>
        <button class="btn danger" id="clearBtn">🗑️ Cancella tutto</button>
      </div>
    </div>
    
    <div class="storico-wrap">
      <div class="storico-header">
        <span>📋 Ultimi rilevamenti</span>
        <span id="countBadge" style="background:var(--accent);color:#000;padding:2px 8px;border-radius:10px;font-size:0.75rem">0</span>
      </div>
      <div class="storico-list" id="storicoList"></div>
    </div>
  </div>
  
  <div id="status">In attesa di connessione...</div>

  <script>
    // ===== CONFIG =====
    const MAX_DIST = 200;
    const SWEEP_SPEED = 0.04;
    let sweepAngle = 0;
    let points = [];
    let ws = null;
    let serverUrl = '';
    
    // Canvas setup
    const canvas = document.getElementById('radar');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const CX = W / 2, CY = H - 60; // Centro in basso, spazio per etichette
    const R = Math.min(W, H) * 0.42; // Raggio
    
    // UI elements
    const statusEl = document.getElementById('status');
    const storicoList = document.getElementById('storicoList');
    const countBadge = document.getElementById('countBadge');
    const serverBanner = document.getElementById('serverBanner');
    const serverUrlInput = document.getElementById('serverUrl');
    const connectBtn = document.getElementById('connectBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const clearBtn = document.getElementById('clearBtn');
    
    // ===== UTILS =====
    function polarToCartesian(angleDeg, radius) {
      // 0° = sinistra, 90° = su, 180° = destra
      const rad = (angleDeg * Math.PI) / 180;
      return {
        x: CX + radius * Math.cos(rad),
        y: CY - radius * Math.sin(rad) // meno perché Y cresce verso il basso
      };
    }
    
    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    
    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = type;
    }
    
    // ===== DRAWING =====
    function drawRadar() {
      ctx.clearRect(0, 0, W, H);
      
      // Sfondo semicerchio
      ctx.beginPath();
      ctx.arc(CX, CY, R, Math.PI, 0, false);
      ctx.lineTo(CX, CY);
      ctx.closePath();
      ctx.fillStyle = 'rgba(22, 27, 34, 0.8)';
      ctx.fill();
      
      // Cerchi concentrici (50, 100, 150, 200 cm)
      ctx.strokeStyle = '#30363d';
      ctx.lineWidth = 1;
      for (let d = 50; d <= MAX_DIST; d += 50) {
        const r = (d / MAX_DIST) * R;
        ctx.beginPath();
        ctx.arc(CX, CY, r, Math.PI, 0, false);
        ctx.stroke();
        
        // Etichette distanza (lungo la linea a 15°)
        const pos = polarToCartesian(15, r);
        ctx.fillStyle = '#8b949e';
        ctx.font = '10px JetBrains Mono';
        ctx.fillText(`${d}cm`, pos.x + 5, pos.y - 3);
      }
      
      // Linee angolari
      ctx.strokeStyle = '#30363d';
      ctx.setLineDash([4, 4]);
      [0, 30, 60, 90, 120, 150, 180].forEach(ang => {
        const end = polarToCartesian(ang, R);
        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.lineTo(end.x, end.y);
        ctx.stroke();
        
        // Etichette gradi SOTTO la baseline
        const labelPos = polarToCartesian(ang, R + 18);
        ctx.fillStyle = '#8b949e';
        ctx.font = '10px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText(`${ang}°`, labelPos.x, labelPos.y + 4);
      });
      ctx.setLineDash([]);
      
      // Baseline
      ctx.strokeStyle = '#58a6c8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(CX - R, CY);
      ctx.lineTo(CX + R, CY);
      ctx.stroke();
      
      // Sweep sector
      ctx.beginPath();
      ctx.arc(CX, CY, R, Math.PI, Math.PI - sweepAngle, true);
      ctx.lineTo(CX, CY);
      ctx.closePath();
      ctx.fillStyle = 'rgba(88, 166, 200, 0.08)';
      ctx.fill();
      
      // Sweep line
      const sweepEnd = polarToCartesian(sweepAngle * 180 / Math.PI, R);
      ctx.strokeStyle = '#58a6c8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.lineTo(sweepEnd.x, sweepEnd.y);
      ctx.stroke();
      
      // Punti rilevamenti
      points.forEach(p => {
        const pos = polarToCartesian(p.angolo, (p.distanza / MAX_DIST) * R);
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#f85149';
        ctx.fill();
        ctx.strokeStyle = '#161b22';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });
      
      // Sweep animation
      sweepAngle += SWEEP_SPEED;
      if (sweepAngle > Math.PI) sweepAngle = 0;
      
      requestAnimationFrame(drawRadar);
    }
    
    // ===== DATA =====
    function addPoint(angolo, distanza) {
      // Filtra punti fuori range
      if (distanza > MAX_DIST || distanza < 0) return;
      
      // Aggiungi punto (mantieni max 200 punti per performance)
      points.unshift({ angolo, distanza, ts: Date.now() });
      if (points.length > 200) points.pop();
      
      // Aggiungi alla lista storico
      const item = document.createElement('div');
      item.className = 'storico-item';
      item.innerHTML = `
        <span class="ang">${angolo.toFixed(1)}°</span>
        <span class="dist">${Math.round(distanza)}cm</span>
        <span class="time">${formatTime(Date.now())}</span>
      `;
      storicoList.insertBefore(item, storicoList.firstChild);
      
      // Mantieni max 50 voci nella lista
      while (storicoList.children.length > 50) {
        storicoList.removeChild(storicoList.lastChild);
      }
      
      countBadge.textContent = points.length;
    }
    
    function clearAll() {
      points = [];
      storicoList.innerHTML = '';
      countBadge.textContent = '0';
    }
    
    // ===== NETWORK =====
    function getApiUrl(path) {
      if (!serverUrl) return null;
      // Assicurati che non ci sia trailing slash
      const base = serverUrl.replace(/\/$/, '');
      return `${base}${path}`;
    }
    
    function connectWS() {
      if (!serverUrl) {
        setStatus('⚠️ Inserisci l\'URL del server', 'error');
        return;
      }
      
      // Converti https:// → wss://, http:// → ws://
      const wsUrl = serverUrl.replace(/^https?:/, proto => 
        proto === 'https:' ? 'wss:' : 'ws:'
      ) + '/ws';
      
      console.log('🔌 Connettendo a:', wsUrl);
      setStatus('🔄 Connessione...');
      
      try {
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
          console.log('✅ WebSocket connesso');
          setStatus('🟢 Connesso', 'connected');
          serverBanner.style.display = 'none';
          loadHistory();
        };
        
        ws.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            if (data.angolo !== undefined && data.distanza !== undefined) {
              addPoint(data.angolo, data.distanza);
            }
          } catch (err) {
            console.error('❌ Errore parsing:', err);
          }
        };
        
        ws.onclose = () => {
          console.log('🔌 WebSocket chiuso');
          setStatus('🔴 Disconnesso - clicca per riconnettere', 'error');
          serverBanner.style.display = 'flex';
          ws = null;
        };
        
        ws.onerror = (err) => {
          console.error('❌ WebSocket error:', err);
          setStatus('❌ Errore connessione', 'error');
        };
      } catch (err) {
        console.error('❌ Errore creazione WebSocket:', err);
        setStatus('❌ URL non valido', 'error');
      }
    }
    
    async function loadHistory() {
      const url = getApiUrl('/api/storico?limit=50');
      if (!url) return;
      
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const dati = await res.json();
        
        // Pulisci e ricarica
        clearAll();
        // Mostra dal più vecchio al più recente
        dati.reverse().forEach(d => {
          addPoint(d.angolo, d.distanza);
        });
        console.log(`📥 Caricati ${dati.length} rilevamenti storici`);
      } catch (err) {
        console.error('❌ Errore loadHistory:', err);
        setStatus('⚠️ Impossibile caricare storico', 'error');
      }
    }
    
    async function clearHistory() {
      if (!confirm('Cancellare TUTTI i rilevamenti salvati?')) return;
      
      const url = getApiUrl('/api/storico');
      if (!url) return;
      
      try {
        const res = await fetch(url, { method: 'DELETE' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const result = await res.json();
        
        if (result.ok) {
          clearAll();
          setStatus('🗑️ Storico cancellato', 'connected');
          console.log('✅ Storico cancellato sul server');
        }
      } catch (err) {
        console.error('❌ Errore cancellazione:', err);
        alert('Errore nella cancellazione: ' + err.message);
      }
    }
    
    // ===== INIT =====
    function init() {
      // Carica URL salvato
      const saved = localStorage.getItem('radar_server_url');
      if (saved) {
        serverUrl = saved;
        serverUrlInput.value = saved;
        connectWS();
      }
      
      // Event listeners
      connectBtn.onclick = () => {
        const url = serverUrlInput.value.trim();
        if (!url) {
          alert('Inserisci un URL valido');
          return;
        }
        serverUrl = url;
        localStorage.setItem('radar_server_url', url);
        connectWS();
      };
      
      refreshBtn.onclick = () => {
        if (ws?.readyState === WebSocket.OPEN) {
          loadHistory();
        } else {
          setStatus('⚠️ Connetti prima al server', 'error');
        }
      };
      
      clearBtn.onclick = clearHistory;
      
      // Start animation
      drawRadar();
      
      console.log('🎯 Radar inizializzato');
    }
    
    init();
  </script>
</body>
</html>
