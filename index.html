<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar Miniatura</title>
  <style>
    :root {
      --bg-main: #0b1120;
      --bg-panel: #111827;
      --bg-card: #1f2937;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --accent: #22d3ee;
      --accent-glow: rgba(34, 211, 238, 0.4);
      --danger: #f87171;
      --warning: #fbbf24;
      --success: #34d399;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
      --border: rgba(255,255,255,0.08);
      --detect-color: rgba(251, 191, 36, 0.9);
      --detect-pulse: rgba(251, 191, 36, 0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at 30% 20%, #0f172a 0%, var(--bg-main) 70%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .dashboard {
      width: 100%;
      max-width: 880px;
      background: var(--bg-panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 24px;
    }
    header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      background: linear-gradient(90deg, var(--accent), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-card);
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 18px;
      font-size: 0.85rem;
      flex-wrap: wrap;
      gap: 8px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: var(--text-secondary);
      transition: color 0.3s ease;
    }
    .status-badge.online { color: var(--success); }
    .status-badge.offline { color: var(--warning); }
    .status-dot {
      width: 7px; height: 7px;
      background: currentColor;
      border-radius: 50%;
      animation: pulse 1.8s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.8); }
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    button {
      background: var(--accent);
      color: #0f172a;
      border: none;
      padding: 9px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(34, 211, 238, 0.25);
    }
    button:hover { background: #06b6d4; transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    button.danger { 
      background: transparent; 
      border: 1px solid var(--danger); 
      color: var(--danger); 
      box-shadow: none;
    }
    button.danger:hover { background: var(--danger); color: #fff; }
    
    /* RADAR VISUALIZER */
    .radar-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      margin: 0 auto 24px;
      aspect-ratio: 1;
      background: radial-gradient(circle, #0a0f1a 0%, #070c14 70%, #05090f 100%);
      border-radius: 50%;
      border: 2px solid var(--border);
      box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
      overflow: hidden;
    }
    #radarCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .radar-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    .radar-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }
    .detect-flash {
      position: absolute;
      border-radius: 50%;
      background: var(--detect-color);
      opacity: 0;
      pointer-events: none;
      animation: detectPulse 0.6s ease-out forwards;
      z-index: 5;
    }
    @keyframes detectPulse {
      0% { transform: scale(0.2); opacity: 0.9; }
      70% { transform: scale(1.8); opacity: 0.4; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }
    .metric-card {
      background: var(--bg-card);
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-align: center;
      transition: transform 0.2s ease;
    }
    .metric-card:hover { transform: translateY(-2px); }
    .metric-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }
    .metric-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .table-wrapper {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 22px;
      max-height: 220px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-card);
      font-size: 0.9rem;
    }
    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: rgba(0,0,0,0.25);
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    tr:hover td { background: rgba(255,255,255,0.03); }
    
    .footer-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .footer-controls button {
      background: transparent;
      border: 1px solid var(--text-secondary);
      color: var(--text-secondary);
      box-shadow: none;
      padding: 8px 14px;
    }
    .footer-controls button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(34, 211, 238, 0.08);
    }
    @media (max-width: 520px) {
      .dashboard { padding: 16px; }
      .metrics-grid { grid-template-columns: 1fr; }
      .status-bar { flex-direction: column; align-items: flex-start; }
      .radar-container { max-width: 300px; }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <header>
      <h1>Radar Miniatura</h1>
    </header>

    <div class="status-bar">
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span id="statusText">RADAR MINIATURA offline ⚙</span>
      </div>
      <div id="ngrokInfo">server ngrok:</div>
    </div>

    <div class="controls">
      <button id="btnConnect">connetti</button>
      <button id="btnClear" class="danger">✕ Svuota radar</button>
    </div>

    <div class="radar-container">
      <canvas id="radarCanvas"></canvas>
      <div class="radar-overlay">
        <div class="metric-value" id="liveAngle">—°</div>
        <div class="radar-label">Angolo</div>
      </div>
    </div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Ultimo Rilevamento</div>
        <div class="metric-value" id="lastDetect">Angolo — °</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Distanza</div>
        <div class="metric-value" id="lastDist">— cm</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Min — Max</div>
        <div class="metric-value" id="rangeStats">0 rilevamenti</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Ø — ⚠</div>
        <div class="metric-value" id="warningCount">0</div>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Ora</th>
            <th>Ang</th>
            <th>Dist</th>
          </tr>
        </thead>
        <tbody id="detectTable">
          <tr>
            <td>Nessun dato</td>
            <td>Nessun dato</td>
            <td>Nessun dato</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="footer-controls">
      <button id="btnHistory">↺ Storico</button>
      <button id="btnDelete" class="danger">✕ Cancella</button>
    </div>
  </div>

  <script>
    // ─── CONFIG (matches config.h & backend) ─────────────────────
    const CONFIG = {
      SCAN_DEGREES: 180,
      MAX_DIST: 200,
      SWEEP_PERIOD: 2000,     // ms per 0°→180°→0°
      STUTTER_DURATION: 150,  // ms freeze on detection
      MAX_TABLE_ROWS: 20,
      MAX_DETECTIONS: 150,
      WS_PATH: '/'            // matches index.js WebSocketServer
    };

    // ─── STATE ───────────────────────────────────────────────────
    let ws = null;
    let sweepAngle = 0;
    let sweepDir = 1;
    let lastFrameTime = 0;
    let stutterUntil = 0;
    let detections = []; // {angolo, distanza, timestamp, ts}
    let isConnected = false;
    let canvas, ctx, centerX, centerY, radius;

    // ─── DOM ─────────────────────────────────────────────────────
    const statusBadge = document.getElementById('statusBadge');
    const statusText = document.getElementById('statusText');
    const liveAngleEl = document.getElementById('liveAngle');
    const lastDetectEl = document.getElementById('lastDetect');
    const lastDistEl = document.getElementById('lastDist');
    const rangeStatsEl = document.getElementById('rangeStats');
    const warningCountEl = document.getElementById('warningCount');
    const detectTable = document.getElementById('detectTable');
    const btnConnect = document.getElementById('btnConnect');
    const btnClear = document.getElementById('btnClear');
    const btnHistory = document.getElementById('btnHistory');
    const btnDelete = document.getElementById('btnDelete');

    // ─── CANVAS SETUP ────────────────────────────────────────────
    function initCanvas() {
      canvas = document.getElementById('radarCanvas');
      ctx = canvas.getContext('2d');
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    }

    function resizeCanvas() {
      const container = canvas.parentElement;
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      centerX = canvas.width / 2;
      centerY = canvas.height / 2;
      radius = Math.min(centerX, centerY) * 0.92;
      drawStaticGrid();
    }

    function drawStaticGrid() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      for (let r = 1; r <= 4; r++) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius * r/4, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      for (let a = 0; a <= CONFIG.SCAN_DEGREES; a += 30) {
        const rad = (a - 90) * Math.PI / 180;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(rad) * radius, centerY + Math.sin(rad) * radius);
        ctx.stroke();
      }
      ctx.fillStyle = 'rgba(34,211,238,0.6)';
      ctx.beginPath(); ctx.arc(centerX, centerY, 4, 0, Math.PI*2); ctx.fill();
      
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '10px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('0°', centerX + radius * 0.95, centerY + 12);
      ctx.fillText('90°', centerX, centerY - radius * 0.95);
      ctx.fillText('180°', centerX - radius * 0.98, centerY + 12);
      ctx.fillText('50', centerX + radius * 0.52, centerY - 8);
      ctx.fillText('100', centerX + radius * 0.78, centerY - 8);
      ctx.fillText('200', centerX + radius * 0.98, centerY - 8);
    }

    // ─── ANIMATION LOOP ──────────────────────────────────────────
    function animate(timestamp) {
      if (!lastFrameTime) lastFrameTime = timestamp;
      const dt = timestamp - lastFrameTime;
      
      // Update sweep
      if (isConnected && timestamp >= stutterUntil) {
        sweepAngle += sweepDir * (dt / CONFIG.SWEEP_PERIOD) * CONFIG.SCAN_DEGREES;
        if (sweepAngle >= CONFIG.SCAN_DEGREES) { sweepAngle = CONFIG.SCAN_DEGREES; sweepDir = -1; }
        else if (sweepAngle <= 0) { sweepAngle = 0; sweepDir = 1; }
      }
      liveAngleEl.textContent = `${Math.round(sweepAngle)}°`;
      
      // Draw
      drawStaticGrid();
      drawDetections();
      drawSweepLine();
      
      lastFrameTime = timestamp;
      requestAnimationFrame(animate);
    }

    function drawSweepLine() {
      const rad = (sweepAngle - 90) * Math.PI / 180;
      const x = centerX + Math.cos(rad) * radius;
      const y = centerY + Math.sin(rad) * radius;
      
      const grad = ctx.createLinearGradient(centerX, centerY, x, y);
      grad.addColorStop(0, 'rgba(34,211,238,0.1)');
      grad.addColorStop(0.7, 'rgba(34,211,238,0.4)');
      grad.addColorStop(1, 'rgba(34,211,238,0.9)');
      
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(x, y); ctx.stroke();
      ctx.shadowColor = 'rgba(34,211,238,0.6)';
      ctx.shadowBlur = 12; ctx.stroke(); ctx.shadowBlur = 0;
    }

    function drawDetections() {
      const now = Date.now();
      detections.forEach(d => {
        const age = now - d.ts;
        if (age > 8000) return; // fade out after 8s
        
        const rad = (d.angolo - 90) * Math.PI / 180;
        const ratio = Math.min(d.distanza / CONFIG.MAX_DIST, 1);
        const x = centerX + Math.cos(rad) * radius * ratio;
        const y = centerY + Math.sin(rad) * radius * ratio;
        
        const opacity = Math.max(0.2, 1 - age/8000);
        const pulse = (age < 400) ? 1 + Math.sin(age/40)*0.25 : 1;
        
        ctx.fillStyle = `rgba(251, 191, 36, ${opacity})`;
        ctx.beginPath(); ctx.arc(x, y, 3.5 * pulse, 0, Math.PI*2); ctx.fill();
        
        ctx.strokeStyle = `rgba(251, 191, 36, ${opacity * 0.5})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(x, y, 7 * pulse, 0, Math.PI*2); ctx.stroke();
      });
    }

    // ─── DATA HANDLING (NO DEDUP HERE - handled by ESP32/Backend) ─
    function handleDetection(data) {
      const { angolo, distanza, timestamp } = data;
      const now = Date.now();
      
      detections.unshift({ angolo, distanza, ts: now });
      if (detections.length > CONFIG.MAX_DETECTIONS) detections.pop();
      
      // Trigger stutter effect
      stutterUntil = now + CONFIG.STUTTER_DURATION;
      createFlash(angolo, distanza);
      
      // Update UI
      lastDetectEl.textContent = `Angolo ${Math.round(angolo)}°`;
      lastDistEl.textContent = `${distanza} cm`;
      updateStats();
      updateTable();
    }

    function createFlash(angle, dist) {
      const rad = (angle - 90) * Math.PI / 180;
      const ratio = Math.min(dist / CONFIG.MAX_DIST, 1);
      const x = centerX + Math.cos(rad) * radius * ratio;
      const y = centerY + Math.sin(rad) * radius * ratio;
      
      const flash = document.createElement('div');
      flash.className = 'detect-flash';
      flash.style.left = `${x}px`; flash.style.top = `${y}px`;
      flash.style.width = '28px'; flash.style.height = '28px';
      flash.style.marginLeft = '-14px'; flash.style.marginTop = '-14px';
      document.querySelector('.radar-container').appendChild(flash);
      setTimeout(() => flash.remove(), 600);
    }

    function updateStats() {
      if (detections.length === 0) return;
      const dists = detections.map(d => d.distanza);
      const min = Math.min(...dists);
      const max = Math.max(...dists);
      rangeStatsEl.textContent = `${min}–${max} cm`;
      warningCountEl.textContent = detections.filter(d => d.distanza < 30).length;
    }

    function updateTable() {
      if (detections.length === 0) {
        detectTable.innerHTML = `<tr><td>Nessun dato</td><td>Nessun dato</td><td>Nessun dato</td></tr>`;
        return;
      }
      detectTable.innerHTML = detections.slice(0, CONFIG.MAX_TABLE_ROWS).map(d => {
        const time = new Date(d.timestamp || d.ts).toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        return `<tr><td>${time}</td><td>${d.angolo.toFixed(1)}°</td><td>${d.distanza} cm</td></tr>`;
      }).join('');
    }

    // ─── WEBSOCKET CONNECTION ────────────────────────────────────
    function connectWS() {
      if (ws) ws.close();
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}${CONFIG.WS_PATH}`);
      
      btnConnect.disabled = true;
      btnConnect.textContent = 'connettendo...';
      
      ws.onopen = () => {
        isConnected = true;
        statusBadge.classList.remove('offline');
        statusBadge.classList.add('online');
        statusText.textContent = 'RADAR MINIATURA online';
        btnConnect.textContent = 'connesso';
        console.log('WebSocket connesso');
      };
      
      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.angolo !== undefined && data.distanza !== undefined) {
            handleDetection(data);
          }
        } catch (err) {
          console.warn('WS parse error:', err);
        }
      };
      
      ws.onclose = () => {
        isConnected = false;
        statusBadge.classList.remove('online');
        statusBadge.classList.add('offline');
        statusText.textContent = 'RADAR MINIATURA offline ⚙';
        btnConnect.textContent = 'connetti';
        btnConnect.disabled = false;
        console.log('🔌 WebSocket disconnesso');
      };
      
      ws.onerror = (err) => {
        console.error('WS error:', err);
        ws.close();
      };
    }

    // ─── EVENT LISTENERS ─────────────────────────────────────────
    btnConnect.addEventListener('click', () => {
      if (!isConnected) connectWS();
    });

    btnClear.addEventListener('click', () => {
      detections = [];
      updateTable();
      updateStats();
      lastDetectEl.textContent = 'Angolo — °';
      lastDistEl.textContent = '— cm';
      rangeStatsEl.textContent = '0 rilevamenti';
      warningCountEl.textContent = '0';
    });

    btnHistory.addEventListener('click', async () => {
      try {
        const res = await fetch('/api/storico?limit=100');
        const data = await res.json();
        if (data.length) {
          detections = data.map(d => ({ ...d, ts: Date.now() }));
          updateTable();
          updateStats();
        } else {
          alert('Nessuno storico trovato');
        }
      } catch (e) {
        alert('Errore caricamento storico');
      }
    });

    btnDelete.addEventListener('click', async () => {
      if (!confirm('Cancellare tutto lo storico dal database?')) return;
      try {
        await fetch('/api/storico', { method: 'DELETE' });
        detections = [];
        updateTable();
        updateStats();
        alert('Storico cancellato');
      } catch (e) {
        alert('Errore cancellazione');
      }
    });

    // ─── INIT ────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      initCanvas();
      requestAnimationFrame(animate);
      // Auto-attempt connection on load
      setTimeout(connectWS, 800);
    });
  </script>
</body>
</html>
